name: measure_app
description: iPhone-style AR Ruler — distance, area, level, height in Flutter/Dart
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera — live feed
  camera: ^0.10.5+9

  # Sensors — gyro + accel for level & depth assist
  sensors_plus: ^5.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Screenshot + share
  screenshot: ^3.0.0
  share_plus: ^10.0.2
  path_provider: ^2.1.3

  # Storage
  shared_preferences: ^2.2.3

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Math
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
