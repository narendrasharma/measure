name: measure_app
description: AR Object Dimension Measurement App - Pro
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera - real feed
  camera: ^0.10.5+9

  # AR
  ar_flutter_plugin_flutterflow: ^0.7.56

  # Permissions
  permission_handler: ^11.3.1

  # Sensors - accelerometer for height mode
  sensors_plus: ^5.0.1

  # Screenshot capture
  screenshot: ^3.0.0

  # Share / export
  share_plus: ^10.0.2

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # Path provider for saving files
  path_provider: ^2.1.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utils
  vector_math: ^2.1.4
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
